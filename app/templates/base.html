<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieRec{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{{ url_for('index') }}" class="logo">MovieRec</a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">Browse</a>
                <a href="{{ url_for('recommendations') }}">
                    My Recommendations
                    {% if liked_count %}<span class="badge">{{ liked_count }}</span>{% endif %}
                </a>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
